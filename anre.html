<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANRE FlashCards - Pregatire Examen Grad II</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(145deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);min-height:100vh;color:#E2E8F0;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes streakPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes fireGlow{0%,100%{text-shadow:0 0 8px #F59E0B}50%{text-shadow:0 0 20px #EF4444,0 0 40px #F59E0B}}
.fade-in{animation:fadeIn .4s ease forwards}
.pop-in{animation:popIn .35s ease forwards}
.streak-pop{animation:streakPop .5s ease forwards}
.fire-glow{animation:fireGlow 1s ease infinite}
.container{max-width:680px;margin:0 auto;padding:24px 16px;min-height:100vh;display:flex;flex-direction:column}
.menu-header{text-align:center;margin-bottom:28px;padding-top:16px}
.menu-icon{font-size:48px;margin-bottom:6px}
.menu-title{font-size:34px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#F59E0B,#3B82F6,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.menu-sub{color:#94A3B8;font-size:15px;margin-top:6px}
.menu-version{color:#475569;font-size:11px;margin-top:4px}
.best-scores{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.best-pill{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:700;background:rgba(30,41,59,.8);border:1px solid rgba(100,116,139,.3)}
.section-label{color:#CBD5E1;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:16px}
.cat-card{background:rgba(30,41,59,.8);border:2px solid rgba(100,116,139,.3);border-radius:14px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .25s ease;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.cat-card:active{transform:scale(.98)!important;opacity:.9}
.cat-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.cat-card.selected{transform:scale(1.01)}
.cat-card .cat-name{font-size:18px;font-weight:700;margin-bottom:2px}
.cat-card .cat-desc{font-size:12px;color:#94A3B8}
.cat-card .cat-right{display:flex;align-items:center;gap:10px}
.cat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:16px}
.cat-check{width:26px;height:26px;border-radius:7px;border:2px solid #475569;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opts-row{display:flex;gap:8px;flex-wrap:wrap}
.opt-btn{flex:1;min-width:0;background:rgba(30,41,59,.8);border:2px solid rgba(100,116,139,.3);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .25s;color:#94A3B8;font-size:13px;font-weight:600;-webkit-tap-highlight-color:transparent}
.opt-btn:active{transform:scale(.96);opacity:.8}
.opt-btn:hover{border-color:rgba(100,116,139,.6)}
.opt-btn.active{border-color:#F59E0B;color:#F59E0B;background:rgba(245,158,11,.08)}
.start-btn{display:block;width:100%;margin:20px auto 0;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;color:#FFF;-webkit-tap-highlight-color:transparent}
.start-btn:active{transform:scale(.97)!important}
.start-btn:disabled{background:rgba(100,116,139,.3);color:#64748B;cursor:not-allowed}
.start-btn:not(:disabled){background:linear-gradient(135deg,#F59E0B,#EF4444);box-shadow:0 4px 20px rgba(245,158,11,.35)}
.start-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,158,11,.45)}
.footer-note{color:#64748B;font-size:11px;text-align:center;margin-top:16px;padding-bottom:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.back-btn{background:rgba(100,116,139,.2);border:1px solid rgba(100,116,139,.3);color:#94A3B8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;-webkit-tap-highlight-color:transparent}
.back-btn:active{opacity:.7}
.cat-tag{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700}
.score-tag{font-size:13px;font-weight:700;transition:color .3s}
.timer-tag{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.streak-badge{font-size:14px;font-weight:800;color:#F59E0B;white-space:nowrap}
.progress-wrap{background:rgba(100,116,139,.2);border-radius:6px;height:5px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:6px;transition:width .5s ease}
.progress-info{display:flex;justify-content:space-between;margin-top:4px;color:#64748B;font-size:11px}
.diff-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em}
.question-card{background:rgba(30,41,59,.9);border:1px solid rgba(100,116,139,.3);border-radius:18px;padding:24px 20px;box-shadow:0 8px 28px rgba(0,0,0,.3);margin-top:14px;transition:opacity .2s}
.question-card.fading{opacity:0}
.q-toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.question-text{font-size:18px;font-weight:700;color:#F1F5F9;line-height:1.5;margin-bottom:20px}
.bookmark-btn{background:none;border:1px solid rgba(100,116,139,.3);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:16px;transition:all .2s;color:#64748B;-webkit-tap-highlight-color:transparent}
.bookmark-btn:active{transform:scale(.9)}
.bookmark-btn.active{color:#F59E0B;border-color:#F59E0B;background:rgba(245,158,11,.1)}
.option{border:2px solid rgba(100,116,139,.3);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:12px;background:rgba(51,65,85,.5);-webkit-tap-highlight-color:transparent}
.option:active:not(.answered){transform:scale(.98);opacity:.85}
.option:hover:not(.answered){background:rgba(51,65,85,.8);border-color:rgba(100,116,139,.5)}
.option.correct{background:rgba(16,185,129,.15);border-color:#10B981}
.option.wrong{background:rgba(239,68,68,.15);border-color:#EF4444}
.option.answered{cursor:default}
.opt-num{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#FFF;flex-shrink:0;background:rgba(100,116,139,.3)}
.opt-num.ok{background:#10B981}
.opt-num.bad{background:#EF4444}
.opt-text{font-size:15px;font-weight:500;color:#E2E8F0}
.opt-text.ok{color:#6EE7B7;font-weight:700}
.opt-text.bad{color:#FCA5A5}
.explain-box{border-radius:14px;padding:18px;margin-top:16px;border:1px solid}
.explain-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.explain-text{font-size:14px;color:#CBD5E1;line-height:1.7}
.explain-ref{font-size:11px;color:#64748B;margin-top:8px;font-style:italic}
.next-btn{display:block;margin:16px auto 0;border:none;border-radius:12px;padding:12px 36px;font-size:15px;font-weight:700;cursor:pointer;color:#FFF;background:linear-gradient(135deg,#3B82F6,#6366F1);box-shadow:0 4px 14px rgba(59,130,246,.35);transition:all .3s;-webkit-tap-highlight-color:transparent}
.next-btn:active{transform:scale(.96)!important}
.next-btn:hover{transform:translateY(-2px)}
.next-hint{color:#64748B;font-size:11px;text-align:center;margin-top:6px;padding-bottom:20px}
.learn-reveal-btn{display:block;margin:16px auto;border:2px solid #F59E0B;border-radius:12px;padding:12px 36px;font-size:15px;font-weight:700;cursor:pointer;color:#F59E0B;background:rgba(245,158,11,.08);transition:all .3s;-webkit-tap-highlight-color:transparent}
.learn-reveal-btn:active{transform:scale(.96)!important}
.results-icon{font-size:64px;text-align:center;margin-bottom:12px;padding-top:16px}
.results-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:6px}
.results-sub{color:#94A3B8;font-size:14px;text-align:center;margin-bottom:24px}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.score-inner{width:112px;height:112px;border-radius:50%;background:#1E293B;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-size:32px;font-weight:800;color:#F8FAFC}
.score-frac{font-size:13px;color:#94A3B8}
.stats-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.stat-box{background:rgba(30,41,59,.8);border:1px solid rgba(100,116,139,.2);border-radius:12px;padding:12px 14px;flex:1;text-align:center}
.stat-val{font-size:20px;font-weight:800}
.stat-label{font-size:11px;color:#94A3B8;margin-top:2px}
.cat-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 10px;background:rgba(30,41,59,.6);border-radius:8px}
.cat-stat-name{font-weight:700;width:120px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-stat-bar{flex:1;background:rgba(100,116,139,.2);border-radius:3px;height:6px;overflow:hidden}
.cat-stat-fill{height:100%;border-radius:3px}
.cat-stat-pct{color:#94A3B8;font-size:12px;font-weight:600;width:65px;text-align:right;white-space:nowrap}
.time-stats{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.time-box{background:rgba(30,41,59,.6);border-radius:10px;padding:10px 14px;text-align:center}
.time-val{font-size:18px;font-weight:800;color:#A78BFA}
.time-lbl{font-size:10px;color:#64748B;margin-top:2px}
.wrong-section{margin-bottom:20px}
.wrong-label{color:#94A3B8;font-size:12px;font-weight:600;margin-bottom:10px;text-align:center}
.wrong-list{max-height:300px;overflow-y:auto}
.wrong-item{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px 14px;margin-bottom:6px}
.wrong-q{font-size:13px;color:#FCA5A5;font-weight:600;margin-bottom:4px}
.wrong-ans{font-size:11px;color:#64748B}
.wrong-ans span.red{color:#EF4444}
.wrong-ans span.green{color:#10B981}
.btns-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-bottom:24px}
.result-btn{border:none;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;color:#FFF;transition:all .3s;-webkit-tap-highlight-color:transparent}
.result-btn:active{transform:scale(.96)!important}
.result-btn:hover{transform:translateY(-2px)}
.btn-retry{background:linear-gradient(135deg,#EF4444,#DC2626);box-shadow:0 4px 14px rgba(239,68,68,.3)}
.btn-menu{background:linear-gradient(135deg,#3B82F6,#6366F1);box-shadow:0 4px 14px rgba(59,130,246,.3)}
.btn-all{background:linear-gradient(135deg,#F59E0B,#EF4444);box-shadow:0 4px 14px rgba(245,158,11,.3)}
.btn-bm{background:linear-gradient(135deg,#A78BFA,#7C3AED);box-shadow:0 4px 14px rgba(167,139,250,.3)}
@media(max-width:480px){
  .menu-title{font-size:28px}
  .menu-sub{font-size:13px}
  .cat-card{padding:14px 14px}
  .cat-card .cat-name{font-size:16px}
  .question-card{padding:20px 16px}
  .question-text{font-size:16px}
  .opt-text{font-size:14px}
  .option{padding:12px 14px}
  .explain-text{font-size:13px}
  .topbar{gap:4px}
  .score-tag,.timer-tag{font-size:12px}
  .results-title{font-size:24px}
  .score-circle{width:120px;height:120px}
  .score-inner{width:96px;height:96px}
  .score-pct{font-size:28px}
  .stats-row{gap:6px}
  .stat-val{font-size:18px}
  .btns-row{gap:8px}
  .result-btn{padding:10px 16px;font-size:13px}
}
</style>
</head>
<body>
<div id="app" class="container"></div>
<script>
var CATEGORIES = {
  electrotehnica: { label: "Electrotehnica", color: "#F59E0B", dark: "#92400E", icon: "\u26A1", desc: "Ohm, Kirchhoff, CA, trifazat, transformatoare, motoare" },
  legislatie: { label: "Legislatie", color: "#3B82F6", dark: "#1E3A5F", icon: "\u2696\uFE0F", desc: "Legea 123/2012, Ord. 59/2013, Ord. 66/2023" },
  normative: { label: "Norme Tehnice", color: "#10B981", dark: "#064E3B", icon: "\uD83D\uDCD0", desc: "I7-2011, PE 102, PE 155, scheme TN/TT/IT" }
};
var Q = {
  electrotehnica: [
    { q:"Valoarea medie patratica a unei marimi periodice se mai numeste si:", a:["A) valoarea eficace","B) valoarea efectiva","C) valoarea medie"], c:1, d:1, ref:"Electrotehnica generala", ex:"Termenul corect in limba romana este 'valoarea efectiva' (RMS). 'Eficace' este un termen francez nestandard." },
    { q:"Intr-un circuit R-L serie, tensiunea la bornele circuitului este:", a:["A) suma aritmetica a tensiunilor pe R si L","B) diferenta tensiunilor pe R si L","C) suma vectoriala (geometrica) a tensiunilor pe R si L"], c:2, d:2, ref:"Circuite CA, diagrame fazoriale", ex:"U = sqrt(UR2 + UL2). Tensiunile sunt defazate cu 90 grade, deci se aduna vectorial, NU aritmetic." },
    { q:"Circulatia campului magnetic pe un contur inchis este egala cu:", a:["A) zero","B) suma caderilor de tensiune de-a lungul circuitului","C) suma algebrica a curentilor care strabat conturul"], c:2, d:3, ref:"Legea lui Ampere", ex:"Teorema circulatiei (Legea lui Ampere): circulatia vectorului H = suma algebrica a curentilor din contur." },
    { q:"Materialele feromagnetice au permeabilitatea magnetica relativa:", a:["A) mai mica decat 1","B) egala cu 1","C) mult mai mare decat 1"], c:2, d:1, ref:"Materiale magnetice", ex:"Fier, nichel, cobalt: miu_r >> 1 (mii - sute de mii). Diamagnetice: miu_r < 1. Paramagnetice: miu_r aprox. 1." },
    { q:"Factor de putere cos fi = 0,8 inductiv. P = 4 kW. Puterea aparenta S = ?", a:["A) 3,2 kVA","B) 5 kVA","C) 4,8 kVA"], c:1, d:2, ref:"Triunghiul puterilor", ex:"S = P / cos fi = 4 / 0,8 = 5 kVA. Puterea aparenta >= puterea activa." },
    { q:"Sistemul de tensiuni al unei retele cu t.e.m. simetrice este simetric:", a:["A) chiar daca fazele sunt neegal incarcate","B) doar daca fazele sunt egal incarcate","C) intotdeauna"], c:1, d:2, ref:"Sisteme trifazate simetrice", ex:"Simetria se mentine doar daca fazele sunt echilibrat incarcate." },
    { q:"Energia electrica tranzitata este produsul dintre:", a:["A) puterea maxima si timpul de utilizare","B) puterea medie si durata de functionare","C) curentul maxim si tensiunea nominala"], c:1, d:1, ref:"Energie electrica", ex:"W = P_medie x t. Se foloseste puterea medie. 1 kWh = 1000W x 1h." },
    { q:"Marirea cuplului de pornire la motoarele asincrone cu rotor in scurtcircuit:", a:["A) prin cresterea tensiunii de alimentare","B) prin utilizarea motoarelor cu bare inalte sau dubla colivie","C) prin micsorarea rezistentei statorice"], c:1, d:2, ref:"Motoare asincrone, pornire", ex:"Barele inalte/dubla colivie: cuplu mare la pornire si curent redus, datorita efectului pelicular." },
    { q:"Viteza sincrona: motor asincron cu 4 poli, alimentat la 50 Hz:", a:["A) 3000 rot/min","B) 1500 rot/min","C) 750 rot/min"], c:1, d:2, ref:"Masini electrice rotative", ex:"n1 = 60f/p = 60x50/2 = 1500 rot/min. Cu 2p=4 poli => p=2 perechi." },
    { q:"Puterea activa in sistem trifazat simetric:", a:["A) P = Ul x Il x cos fi","B) P = rad3 x Ul x Il x cos fi","C) P = 3 x Ul x Il x cos fi"], c:1, d:2, ref:"Puteri in sisteme trifazate", ex:"P = rad3 x Ul x Il x cos fi. Valabila pentru stea (Y) si triunghi (delta)." },
    { q:"Raportul de transformare k = U1/U2 = 2. Transformatorul este:", a:["A) ridicator de tensiune","B) coborator de tensiune","C) de izolare"], c:1, d:1, ref:"Transformatoare", ex:"k > 1 => coborator (U2 < U1). k < 1 => ridicator. k = 1 => izolare." },
    { q:"Transformatorul de curent (TC) functioneaza cu secundarul:", a:["A) in gol (deschis)","B) in scurtcircuit (sarcina mica)","C) la jumatate din sarcina nominala"], c:1, d:2, ref:"Transformatoare de masura", ex:"TC: secundar practic in scurtcircuit. NICIODATA nu se deschide secundarul TC sub tensiune!" },
    { q:"Rezistenta electrica a unui conductor creste cu:", a:["A) cresterea sectiunii","B) cresterea lungimii","C) cresterea temperaturii si lungimii"], c:2, d:1, ref:"R = ro x L / S", ex:"R = ro x L / S. Creste cu lungimea si temperatura, scade cu sectiunea." },
    { q:"Legea lui Kirchhoff I (legea nodurilor) spune ca:", a:["A) suma tensiunilor pe o bucla inchisa este zero","B) suma algebrica a curentilor intr-un nod este zero","C) curentul este proportional cu tensiunea"], c:1, d:1, ref:"Legile lui Kirchhoff", ex:"LK1: Suma curentilor care intra = suma curentilor care ies din nod." },
    { q:"Legea lui Kirchhoff II (legea ochiurilor) spune ca:", a:["A) suma algebrica a curentilor intr-un nod este zero","B) suma algebrica a tensiunilor pe o bucla inchisa este zero","C) puterea totala intr-un circuit este constanta"], c:1, d:1, ref:"Legile lui Kirchhoff", ex:"LK2: Suma t.e.m. = suma caderilor de tensiune pe o bucla inchisa." },
    { q:"Efectul termic al curentului electric este descris de legea:", a:["A) lui Ohm","B) lui Joule-Lenz","C) lui Faraday"], c:1, d:1, ref:"Efecte ale curentului electric", ex:"Legea Joule-Lenz: Q = R x I2 x t. Caldura proportionala cu R, I2 si t." },
    { q:"Intr-un circuit R-C serie in CA, curentul:", a:["A) este in faza cu tensiunea","B) este in avans fata de tensiune","C) este in intarziere fata de tensiune"], c:1, d:2, ref:"Circuite R-C serie", ex:"In R-C, curentul devansaza tensiunea cu un unghi 0-90 grade." },
    { q:"Puterea reactiva se masoara in:", a:["A) watti (W)","B) voltamperi reactivi (var)","C) voltamperi (VA)"], c:1, d:1, ref:"Unitati de masura puteri", ex:"P activa = W. Q reactiva = var. S aparenta = VA." },
    { q:"La conexiunea triunghi (delta), relatia Il - If:", a:["A) Il = If","B) Il = rad3 x If","C) Il = If / rad3"], c:1, d:2, ref:"Conexiuni trifazate Y/delta", ex:"Triunghi: Il = rad3 x If, Ul = Uf. Stea: Il = If, Ul = rad3 x Uf." },
    { q:"Frecventa retelei electrice din Romania este:", a:["A) 60 Hz","B) 50 Hz","C) 45 Hz"], c:1, d:1, ref:"Parametri retea electrica RO", ex:"Europa (si Romania): 50 Hz +/- 1%. SUA: 60 Hz." },
    { q:"Rezistivitatea cuprului comparata cu cea a aluminiului este:", a:["A) mai mare","B) mai mica","C) egala"], c:1, d:1, ref:"Proprietati materiale conductoare", ex:"Cu: 0,0175 ohm*mmp/m. Al: 0,028 ohm*mmp/m. Cuprul conduce mai bine." },
    { q:"Motorul asincron trifazat functioneaza pe baza:", a:["A) inductiei electromagnetice si campului magnetic rotitor","B) atractiei electrostatice","C) efectului piezoelectric"], c:0, d:1, ref:"Principiu motor asincron", ex:"Camp magnetic rotitor (stator) induce curent in rotor, creand forta si miscare." },
    { q:"Alunecarea (s) unui motor asincron la sarcina nominala:", a:["A) 50-80%","B) 2-8%","C) 0%"], c:1, d:2, ref:"Parametri motor asincron", ex:"s = (n1-n)/n1. La sarcina nominala: 2-8%. La gol: ~0%. La blocat: 100%." },
    { q:"Pornirea Y-delta reduce curentul de pornire la:", a:["A) jumatate (1/2)","B) o treime (1/3)","C) un sfert (1/4)"], c:1, d:3, ref:"Metode de pornire motoare", ex:"La Y-delta, curentul si cuplul se reduc la 1/3 din valorile la pornirea directa delta." },
    { q:"Un condensator in CC, dupa incarcare completa:", a:["A) permite trecerea curentului","B) se comporta ca un circuit deschis","C) se comporta ca un scurtcircuit"], c:1, d:1, ref:"Condensatoare in CC/CA", ex:"Condensator incarcat = circuit deschis in CC. In CA permite trecerea curentului alternativ." },
    { q:"Factorul de putere al unui circuit pur rezistiv este:", a:["A) 0","B) 0,5","C) 1"], c:2, d:1, ref:"Factor de putere", ex:"Pur rezistiv: cos fi = 1 (U si I in faza). Pur inductiv/capacitiv: cos fi = 0." },

// === STORAGE ===
function store(k,v){try{localStorage.setItem("anre_"+k,JSON.stringify(v))}catch(e){}}
function load(k,def){try{var v=localStorage.getItem("anre_"+k);return v?JSON.parse(v):def}catch(e){return def}}
var bestScores = load("best",{});
var totalSessions = load("sessions",0);
var wrongFreq = load("wrongfreq",{});

// === STATE ===
var state = {
  screen:"menu", selectedCats:[], mode:"all", diffFilter:"all",
  cards:[], idx:0, flipped:false, selected:null, score:0, answered:0, history:[],
  streak:0, maxStreak:0, bookmarked:{}, learnMode:false,
  timerStart:0, timerNow:0, timerInterval:null, questionStart:0, questionTimes:[]
};

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function setState(p){for(var k in p){if(p.hasOwnProperty(k))state[k]=p[k]}render()}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtTime(s){var m=Math.floor(s/60);var sec=Math.floor(s%60);return(m<10?"0":"")+m+":"+(sec<10?"0":"")+sec}

// === ACTIONS ===
function toggleCat(c){var s=state.selectedCats;setState({selectedCats:s.indexOf(c)>=0?s.filter(function(x){return x!==c}):s.concat([c])})}
function setMode(m){setState({mode:m})}
function setDiff(d){setState({diffFilter:d})}

function getFilteredQs(){
  var qs=[];
  state.selectedCats.forEach(function(cat){
    Q[cat].forEach(function(q){
      if(state.diffFilter!=="all"){
        var df=parseInt(state.diffFilter);
        if(q.d!==df) return;
      }
      var copy={};for(var k in q){if(q.hasOwnProperty(k))copy[k]=q[k]}
      copy.cat=cat; qs.push(copy);
    });
  });
  return qs;
}

function startQuiz(){
  var qs=shuffle(getFilteredQs());
  if(state.mode==="25") qs=qs.slice(0,25);
  var learn=(state.mode==="learn");
  totalSessions++;store("sessions",totalSessions);
  var now=Date.now();
  state.screen="quiz";state.cards=qs;state.idx=0;state.flipped=false;state.selected=null;
  state.score=0;state.answered=0;state.history=[];state.streak=0;state.maxStreak=0;
  state.bookmarked={};state.learnMode=learn;
  state.timerStart=now;state.timerNow=now;state.questionStart=now;state.questionTimes=[];
  if(state.timerInterval)clearInterval(state.timerInterval);
  if(!learn){state.timerInterval=setInterval(function(){state.timerNow=Date.now();updateTimer()},1000)}
  render();
}

function updateTimer(){
  var el=document.getElementById("timer");
  if(el){var s=(state.timerNow-state.timerStart)/1000;el.textContent=fmtTime(s)}
  var el2=document.getElementById("scoreTag");
  if(el2&&state.answered>0){
    var pct=Math.round((state.score/state.answered)*100);
    el2.style.color=pct>=72?"#10B981":pct>=50?"#F59E0B":"#EF4444";
  }
}

function handleAnswer(i){
  if(state.selected!==null)return;
  var card=state.cards[state.idx];
  var isCorrect=(i===card.c);
  var qTime=(Date.now()-state.questionStart)/1000;
  var times=state.questionTimes.slice();times.push(qTime);
  var h=state.history.slice();
  h.push({card:card,selected:i,correct:isCorrect,time:qTime});
  var newStreak=isCorrect?state.streak+1:0;
  var maxS=Math.max(state.maxStreak,newStreak);
  if(!isCorrect){var key=card.cat+"_"+state.cards.indexOf(card);wrongFreq[key]=(wrongFreq[key]||0)+1;store("wrongfreq",wrongFreq)}
  state.selected=i;state.score+=isCorrect?1:0;state.answered++;
  state.history=h;state.streak=newStreak;state.maxStreak=maxS;state.questionTimes=times;
  render();
  setTimeout(function(){state.flipped=true;render();scrollToExplain()},250);
}

function scrollToExplain(){
  setTimeout(function(){var el=document.getElementById("explainBox");if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"})},100);
}

function nextCard(){
  if(state.idx+1<state.cards.length){
    var qc=document.getElementById("qcard");if(qc)qc.classList.add("fading");
    setTimeout(function(){
      state.idx++;state.flipped=false;state.selected=null;
      state.questionStart=Date.now();render();window.scrollTo({top:0,behavior:"smooth"});
    },150);
  } else {
    if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
    var cats=[];state.history.forEach(function(h){if(cats.indexOf(h.card.cat)<0)cats.push(h.card.cat)});
    cats.forEach(function(cat){
      var catH=state.history.filter(function(h){return h.card.cat===cat});
      var catOk=catH.filter(function(h){return h.correct}).length;
      var catPct=Math.round((catOk/catH.length)*100);
      if(!bestScores[cat]||catPct>bestScores[cat])bestScores[cat]=catPct;
    });
    var totalPct=Math.round((state.score/state.answered)*100);
    if(!bestScores._overall||totalPct>bestScores._overall)bestScores._overall=totalPct;
    store("best",bestScores);
    state.screen="results";render();
  }
}

function toggleBookmark(){
  var key=state.idx;var bm={};for(var k in state.bookmarked){if(state.bookmarked.hasOwnProperty(k))bm[k]=state.bookmarked[k]}
  if(bm[key])delete bm[key];else bm[key]=true;
  state.bookmarked=bm;render();
}

function revealLearn(){state.flipped=true;render();scrollToExplain()}

function reviewWrong(){
  var wq=state.history.filter(function(h){return!h.correct}).map(function(h){return h.card});
  if(!wq.length)return;
  var now=Date.now();
  state.screen="quiz";state.cards=shuffle(wq);state.idx=0;state.flipped=false;state.selected=null;
  state.score=0;state.answered=0;state.history=[];state.streak=0;state.maxStreak=0;
  state.bookmarked={};state.learnMode=false;
  state.timerStart=now;state.timerNow=now;state.questionStart=now;state.questionTimes=[];
  if(state.timerInterval)clearInterval(state.timerInterval);
  state.timerInterval=setInterval(function(){state.timerNow=Date.now();updateTimer()},1000);
  render();
}

function reviewBookmarked(){
  var bqs=[];for(var k in state.bookmarked){if(state.bookmarked.hasOwnProperty(k)){var idx=parseInt(k);if(state.cards[idx])bqs.push(state.cards[idx])}}
  if(!bqs.length)return;
  var now=Date.now();
  state.screen="quiz";state.cards=shuffle(bqs);state.idx=0;state.flipped=false;state.selected=null;
  state.score=0;state.answered=0;state.history=[];state.streak=0;state.maxStreak=0;
  state.bookmarked={};state.learnMode=false;
  state.timerStart=now;state.timerNow=now;state.questionStart=now;state.questionTimes=[];
  if(state.timerInterval)clearInterval(state.timerInterval);
  state.timerInterval=setInterval(function(){state.timerNow=Date.now();updateTimer()},1000);
  render();
}

function restartSame(){
  var cats=[];state.history.forEach(function(h){if(cats.indexOf(h.card.cat)<0)cats.push(h.card.cat)});
  state.selectedCats=cats;startQuiz();
}

function goMenu(){if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}setState({screen:"menu",selectedCats:[],mode:"all",diffFilter:"all"})}

document.addEventListener("keydown",function(e){
  if(state.screen!=="quiz")return;
  if(!state.flipped&&state.selected===null&&!state.learnMode){
    if(e.key==="1")handleAnswer(0);if(e.key==="2")handleAnswer(1);if(e.key==="3")handleAnswer(2);
  }
  if(state.learnMode&&!state.flipped&&e.key===" "){e.preventDefault();revealLearn()}
  if(state.flipped&&(e.key==="Enter"||e.key===" ")){e.preventDefault();nextCard()}
  if(e.key==="b"||e.key==="B")toggleBookmark();
});

// === RENDER ===
function render(){
  var app=document.getElementById("app");
  if(state.screen==="menu")renderMenu(app);
  else if(state.screen==="quiz")renderQuiz(app);
  else if(state.screen==="results")renderResults(app);
}

var DIFF_LABELS={1:{t:"Usor",c:"#10B981",bg:"#10B98122"},2:{t:"Mediu",c:"#F59E0B",bg:"#F59E0B22"},3:{t:"Greu",c:"#EF4444",bg:"#EF444422"}};

function renderMenu(app){
  var filtered=getFilteredQs();
  var total=filtered.length;
  var displayTotal=state.mode==="25"?Math.min(total,25):total;

  var h='<div class="menu-header">';
  h+='<div class="menu-icon">\u26A1</div>';
  h+='<div class="menu-title">ANRE FlashCards</div>';
  h+='<div class="menu-sub">Pregatire examen Grad IIA &amp; IIB</div>';
  h+='<div class="menu-version">v3.0 \u2022 90 intrebari \u2022 '+totalSessions+' sesiuni completate</div>';

  if(bestScores._overall){
    h+='<div class="best-scores">';
    h+='<span class="best-pill" style="color:#F59E0B;border-color:#F59E0B44">\uD83C\uDFC6 Best: '+bestScores._overall+'%</span>';
    var bk=["electrotehnica","legislatie","normative"];
    for(var bi=0;bi<bk.length;bi++){
      if(bestScores[bk[bi]]){
        var bc=CATEGORIES[bk[bi]];
        h+='<span class="best-pill" style="color:'+bc.color+';border-color:'+bc.color+'44">'+bc.icon+' '+bestScores[bk[bi]]+'%</span>';
      }
    }
    h+='</div>';
  }
  h+='</div>';

  h+='<div class="section-label">Categorii:</div>';
  var keys=["electrotehnica","legislatie","normative"];
  for(var ki=0;ki<keys.length;ki++){
    var key=keys[ki],cat=CATEGORIES[key];
    var sel=state.selectedCats.indexOf(key)>=0;
    var cnt=Q[key].length;
    h+='<div class="cat-card'+(sel?' selected':'')+'" onclick="toggleCat(\''+key+'\')" ';
    h+='style="border-color:'+(sel?cat.color:'rgba(100,116,139,0.3)')+';background:'+(sel?'linear-gradient(135deg,'+cat.dark+'88,'+cat.dark+'44)':'rgba(30,41,59,0.8)')+';box-shadow:'+(sel?'0 4px 16px '+cat.color+'33':'none')+'">';
    h+='<div><div class="cat-name" style="color:'+(sel?cat.color:'#E2E8F0')+'">'+cat.icon+' '+cat.label+'</div>';
    h+='<div class="cat-desc">'+cat.desc+'</div></div>';
    h+='<div class="cat-right"><span class="cat-badge" style="background:'+(sel?cat.color:'rgba(100,116,139,0.3)')+';color:'+(sel?'#FFF':'#94A3B8')+'">'+cnt+'</span>';
    h+='<div class="cat-check" style="border-color:'+(sel?cat.color:'#475569')+';background:'+(sel?cat.color:'transparent')+'">';
    if(sel)h+='<span style="color:#FFF;font-size:15px;font-weight:800">\u2713</span>';
    h+='</div></div></div>';
  }

  h+='<div class="section-label">Mod:</div>';
  h+='<div class="opts-row">';
  var modes=[["all","Toate"],["25","Examen (25)"],["learn","Invatare"]];
  for(var mi=0;mi<modes.length;mi++){
    h+='<div class="opt-btn'+(state.mode===modes[mi][0]?' active':'')+'" onclick="setMode(\''+modes[mi][0]+'\')">'+modes[mi][1]+'</div>';
  }
  h+='</div>';

  h+='<div class="section-label" style="margin-top:14px">Dificultate:</div>';
  h+='<div class="opts-row">';
  var diffs=[["all","Toate"],["1","Usor"],["2","Mediu"],["3","Greu"]];
  for(var di=0;di<diffs.length;di++){
    h+='<div class="opt-btn'+(state.diffFilter===diffs[di][0]?' active':'')+'" onclick="setDiff(\''+diffs[di][0]+'\')">'+diffs[di][1]+'</div>';
  }
  h+='</div>';

  h+='<button class="start-btn" onclick="startQuiz()" '+(state.selectedCats.length===0||displayTotal===0?'disabled':'')+'\>';
  h+='\uD83D\uDE80 '+(state.mode==="learn"?"Invata":"Incepe")+' ('+displayTotal+' intrebari)</button>';
  h+='<div class="footer-note">Ord. 66/2023 \u2022 I7-2011 \u2022 PE 102 \u2022 PE 155 \u2022 Legea 123/2012</div>';
  app.innerHTML=h;
}

function renderQuiz(app){
  var card=state.cards[state.idx];if(!card)return;
  var cat=CATEGORIES[card.cat];
  var pct=state.answered>0?Math.round((state.score/state.answered)*100):0;
  var progress=((state.idx+1)/state.cards.length)*100;
  var dl=DIFF_LABELS[card.d]||DIFF_LABELS[1];
  var isBM=!!state.bookmarked[state.idx];

  var h='<div class="topbar">';
  h+='<button class="back-btn" onclick="goMenu()">\u2190</button>';
  h+='<span class="cat-tag" style="background:'+cat.color+'22;color:'+cat.color+'">'+cat.icon+' '+cat.label+'</span>';
  if(!state.learnMode){
    h+='<span id="scoreTag" class="score-tag" style="color:'+(pct>=72?'#10B981':pct>=50?'#F59E0B':'#EF4444')+'">'+state.score+'/'+state.answered+'</span>';
    h+='<span id="timer" class="timer-tag" style="color:#A78BFA">'+fmtTime((state.timerNow-state.timerStart)/1000)+'</span>';
  }
  if(state.streak>=3&&!state.learnMode){
    h+='<span class="streak-badge'+(state.streak>=5?' fire-glow':'')+'">'+state.streak+'\uD83D\uDD25</span>';
  }
  h+='</div>';

  h+='<div class="progress-wrap"><div class="progress-bar" style="width:'+progress+'%;background:linear-gradient(90deg,'+cat.color+',#EF4444)"></div></div>';
  h+='<div class="progress-info"><span>'+(state.idx+1)+'/'+state.cards.length+'</span>';
  if(!state.learnMode)h+='<span>Taste 1/2/3 \u2022 B=marcheaza</span>';
  else h+='<span>Space=arata \u2022 B=marcheaza</span>';
  h+='</div>';

  h+='<div id="qcard" class="question-card pop-in">';
  h+='<div class="q-toprow">';
  h+='<span class="diff-tag" style="background:'+dl.bg+';color:'+dl.c+'">'+dl.t+'</span>';
  h+='<button class="bookmark-btn'+(isBM?' active':'')+'" onclick="toggleBookmark()" title="Marcheaza (B)">'+(isBM?'\u2605':'\u2606')+'</button>';
  h+='</div>';
  h+='<div class="question-text">'+esc(card.q)+'</div>';

  if(state.learnMode&&!state.flipped){
    for(var i=0;i<card.a.length;i++){
      h+='<div class="option answered" style="opacity:0.5">';
      h+='<div class="opt-num">'+String(i+1)+'</div>';
      h+='<span class="opt-text">'+esc(card.a[i].substring(3))+'</span></div>';
    }
    h+='</div>';
    h+='<button class="learn-reveal-btn" onclick="revealLearn()">\uD83D\uDCA1 Arata raspunsul</button>';
    h+='<div class="next-hint">sau apasa Space</div>';
  } else {
    for(var i=0;i<card.a.length;i++){
      var isC=(i===card.c),isSel=(i===state.selected);
      var cls="",numCls="",txtCls="";
      if(state.selected!==null||state.learnMode){
        cls="answered";
        if(isC){cls+=" correct";numCls="ok";txtCls="ok"}
        else if(isSel){cls+=" wrong";numCls="bad";txtCls="bad"}
      }
      var nc;
      if((state.selected!==null||state.learnMode)&&isC)nc="\u2713";
      else if(state.selected!==null&&isSel&&!isC)nc="\u2717";
      else nc=String(i+1);
      h+='<div class="option '+cls+'" onclick="handleAnswer('+i+')">';
      h+='<div class="opt-num '+numCls+'">'+nc+'</div>';
      h+='<span class="opt-text '+txtCls+'">'+esc(card.a[i].substring(3))+'</span></div>';
    }
    h+='</div>';

    if(state.flipped){
      var wasOk=state.learnMode||(state.selected===card.c);
      h+='<div id="explainBox" class="explain-box fade-in" style="background:linear-gradient(135deg,'+cat.dark+'66,rgba(30,41,59,0.95));border-color:'+(wasOk?'#10B98144':'#EF444444')+'">';
      if(!state.learnMode){
        h+='<div class="explain-label" style="color:'+(wasOk?'#10B981':'#EF4444')+'">'+(wasOk?'\u2713 Corect!':'\u2717 Gresit!')+'</div>';
      } else {
        h+='<div class="explain-label" style="color:'+cat.color+'">\uD83D\uDCA1 Raspuns & Explicatie</div>';
      }
      h+='<div class="explain-text">'+esc(card.ex)+'</div>';
      if(card.ref)h+='<div class="explain-ref">\uD83D\uDCCC '+esc(card.ref)+'</div>';
      h+='</div>';
      h+='<button class="next-btn" onclick="nextCard()" style="margin-top:14px">';
      h+=(state.idx+1<state.cards.length?'Urmatoarea \u2192':'\uD83D\uDCCA Rezultate');
      h+='</button>';
      h+='<div class="next-hint">Enter / Space</div>';
    }
  }
  app.innerHTML=h;
}

function renderResults(app){
  var pct=state.answered>0?Math.round((state.score/state.answered)*100):0;
  var passed=pct>=72;
  var wrong=state.history.filter(function(x){return!x.correct});
  var wc=wrong.length;
  var color=passed?"#10B981":"#F59E0B";
  var deg=Math.round(pct*3.6);
  var totalTime=(state.timerNow-state.timerStart)/1000;
  var avgTime=state.questionTimes.length>0?(state.questionTimes.reduce(function(a,b){return a+b},0)/state.questionTimes.length):0;
  var bmCount=0;for(var bk in state.bookmarked){if(state.bookmarked.hasOwnProperty(bk))bmCount++}

  var catStats={};
  state.history.forEach(function(hi){
    if(!catStats[hi.card.cat])catStats[hi.card.cat]={ok:0,total:0};
    catStats[hi.card.cat].total++;if(hi.correct)catStats[hi.card.cat].ok++;
  });

  var h='<div class="results-icon">'+(passed?'\uD83C\uDF89':'\uD83D\uDCDA')+'</div>';
  h+='<div class="results-title" style="color:'+color+'">'+(passed?'PROMOVAT!':'Mai exerseaza!')+'</div>';
  h+='<div class="results-sub">'+(passed?'Ai depasit pragul de 72% necesar la examen':'Ai nevoie de minim 72% (18/25) pentru promovare')+'</div>';

  h+='<div class="score-circle" style="background:conic-gradient('+color+' '+deg+'deg,rgba(100,116,139,0.2) 0deg);box-shadow:0 0 30px '+color+'44">';
  h+='<div class="score-inner"><div class="score-pct">'+pct+'%</div><div class="score-frac">'+state.score+'/'+state.answered+'</div></div></div>';

  h+='<div class="stats-row">';
  h+='<div class="stat-box"><div class="stat-val" style="color:#10B981">\u2713 '+state.score+'</div><div class="stat-label">Corecte</div></div>';
  h+='<div class="stat-box"><div class="stat-val" style="color:#EF4444">\u2717 '+wc+'</div><div class="stat-label">Gresite</div></div>';
  h+='<div class="stat-box"><div class="stat-val" style="color:#F59E0B">\uD83D\uDD25 '+state.maxStreak+'</div><div class="stat-label">Max streak</div></div>';
  h+='</div>';

  h+='<div class="time-stats">';
  h+='<div class="time-box"><div class="time-val">'+fmtTime(totalTime)+'</div><div class="time-lbl">Timp total</div></div>';
  h+='<div class="time-box"><div class="time-val">'+avgTime.toFixed(1)+'s</div><div class="time-lbl">Medie/intrebare</div></div>';
  if(bestScores._overall){h+='<div class="time-box"><div class="time-val" style="color:#F59E0B">'+bestScores._overall+'%</div><div class="time-lbl">Record</div></div>'}
  h+='</div>';

  var ck=Object.keys(catStats);
  if(ck.length>=1){
    h+='<div style="margin-bottom:20px">';
    for(var ci=0;ci<ck.length;ci++){
      var c2=ck[ci],cs=catStats[c2],cp=Math.round((cs.ok/cs.total)*100),cc=CATEGORIES[c2];
      h+='<div class="cat-stat-row">';
      h+='<span class="cat-stat-name" style="color:'+cc.color+'">'+cc.icon+' '+cc.label+'</span>';
      h+='<div class="cat-stat-bar"><div class="cat-stat-fill" style="width:'+cp+'%;background:'+cc.color+'"></div></div>';
      h+='<span class="cat-stat-pct">'+cs.ok+'/'+cs.total+' ('+cp+'%)</span></div>';
    }
    h+='</div>';
  }

  if(wc>0){
    h+='<div class="wrong-section"><div class="wrong-label">\u2717 Gresite ('+wc+'):</div><div class="wrong-list">';
    for(var i=0;i<wrong.length;i++){
      var wi=wrong[i];
      h+='<div class="wrong-item"><div class="wrong-q">'+esc(wi.card.q)+'</div>';
      h+='<div class="wrong-ans">Tu: <span class="red">'+esc(wi.card.a[wi.selected])+'</span></div>';
      h+='<div class="wrong-ans">Corect: <span class="green">'+esc(wi.card.a[wi.card.c])+'</span></div></div>';
    }
    h+='</div></div>';
  }

  h+='<div class="btns-row">';
  if(wc>0)h+='<button class="result-btn btn-retry" onclick="reviewWrong()">\uD83D\uDD04 Gresite ('+wc+')</button>';
  if(bmCount>0)h+='<button class="result-btn btn-bm" onclick="reviewBookmarked()">\u2605 Marcate ('+bmCount+')</button>';
  h+='<button class="result-btn btn-all" onclick="restartSame()">\u26A1 Reia</button>';
  h+='<button class="result-btn btn-menu" onclick="goMenu()">\uD83C\uDFE0 Meniu</button>';
  h+='</div>';
  app.innerHTML=h;
}

render();
</script>
</body>
</html>
